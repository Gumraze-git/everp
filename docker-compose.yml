services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      TZ: Asia/Seoul
    ports:
      - "${EVERP_POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "${EVERP_REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.7.7
    ports:
      - "${EVERP_KAFKA_PORT:-19092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  auth:
    build:
      context: ./apps/backend/auth
      dockerfile: Dockerfile-dev
    environment:
      JAVA_OPTS: -Xms256m -Xmx512m -Dspring.profiles.active=local -Dserver.port=8080
      EVERP_FRONTEND_ORIGIN: ${EVERP_FRONTEND_ORIGIN:-http://localhost:13000}
      EVERP_AUTH_ISSUER: ${EVERP_AUTH_ISSUER:-http://localhost:18081}
      EVERP_OAUTH_REDIRECT_URI: ${EVERP_OAUTH_REDIRECT_URI:-http://localhost:13000/callback}
      TZ: Asia/Seoul
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${EVERP_AUTH_PORT:-18081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -m 2 -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/); [ \"$$code\" != \"000\" ]"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  business:
    build:
      context: ./apps/backend/business
      dockerfile: Dockerfile-dev
    environment:
      JAVA_OPTS: -Xms256m -Xmx512m -Dspring.profiles.active=local -Dserver.port=8080
      TZ: Asia/Seoul
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${EVERP_BUSINESS_PORT:-18082}:8080"
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -m 2 -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/); [ \"$$code\" != \"000\" ]"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  alarm:
    build:
      context: ./apps/backend/alarm
      dockerfile: Dockerfile-dev
    environment:
      JAVA_OPTS: -Xms256m -Xmx512m -Dspring.profiles.active=local -Dserver.port=8080
      TZ: Asia/Seoul
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${EVERP_ALARM_PORT:-18083}:8080"
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -m 2 -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/); [ \"$$code\" != \"000\" ]"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  scm:
    build:
      context: ./apps/backend/scm
      dockerfile: Dockerfile-dev
    environment:
      JAVA_OPTS: -Xms256m -Xmx512m -Dspring.profiles.active=local -Dserver.port=8080
      TZ: Asia/Seoul
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${EVERP_SCM_PORT:-18084}:8080"
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -m 2 -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/); [ \"$$code\" != \"000\" ]"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  gw:
    build:
      context: ./apps/backend/gw
      dockerfile: Dockerfile-dev
    environment:
      JAVA_OPTS: -Xms256m -Xmx512m -Dspring.profiles.active=local -Dserver.port=8080
      EVERP_FRONTEND_ORIGIN: ${EVERP_FRONTEND_ORIGIN:-http://localhost:13000}
      EVERP_AUTH_ISSUER: ${EVERP_AUTH_ISSUER:-http://localhost:18081}
      TZ: Asia/Seoul
    depends_on:
      auth:
        condition: service_healthy
      business:
        condition: service_healthy
      alarm:
        condition: service_healthy
      scm:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${EVERP_GW_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -m 2 -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/); [ \"$$code\" != \"000\" ]"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 70s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${EVERP_GW_PORT:-18080}/api
        NEXT_PUBLIC_AUTH_BASE_URL: http://localhost:${EVERP_AUTH_PORT:-18081}
        NEXT_PUBLIC_OAUTH_CLIENT_ID: everp-spa
        NEXT_PUBLIC_OAUTH_REDIRECT_URI: ${EVERP_OAUTH_REDIRECT_URI:-http://localhost:13000/callback}
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${EVERP_GW_PORT:-18080}/api
      NEXT_PUBLIC_AUTH_BASE_URL: http://localhost:${EVERP_AUTH_PORT:-18081}
      NEXT_PUBLIC_OAUTH_CLIENT_ID: everp-spa
      NEXT_PUBLIC_OAUTH_REDIRECT_URI: ${EVERP_OAUTH_REDIRECT_URI:-http://localhost:13000/callback}
      INTERNAL_API_BASE_URL: http://gw:8080/api
      INTERNAL_AUTH_BASE_URL: http://auth:8080
      TZ: Asia/Seoul
    depends_on:
      gw:
        condition: service_healthy
      auth:
        condition: service_healthy
    ports:
      - "${EVERP_FRONTEND_PORT:-13000}:3000"

volumes:
  postgres_data:
